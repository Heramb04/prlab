# Every container in a preview namespace must declare CPU/memory requests
# and limits. Without limits, one runaway preview can starve every other
# preview (and the system pods) on the shared node group - the classic
# noisy-neighbor incident on multi-tenant clusters.
#
# Note an admission-ordering subtlety, verified live: for bare Pods this
# policy rarely fires, because the namespace's LimitRange (generated by
# ns-guardrails.yaml) defaults missing requests/limits in the API server's
# built-in mutating phase BEFORE validating webhooks run. It bites at the
# controller level instead - Kyverno autogen validates the Deployment/
# StatefulSet pod *template*, which LimitRange never touches. So the denial
# lands at Deployment admission, which is also where ArgoCD reports it.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-requests-limits
  annotations:
    policies.kyverno.io/description: >-
      Preview containers must declare cpu+memory requests and limits.
      Incident this prevents: one preview with no memory limit OOMing the
      node and evicting every other tenant on it.
spec:
  background: true
  rules:
    - name: require-container-requests-limits
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaceSelector:
                matchLabels:
                  preview: "true"
      validate:
        failureAction: Enforce
        message: >-
          Preview containers must declare resources.requests and
          resources.limits for both cpu and memory.
        pattern:
          spec:
            containers:
              - resources:
                  requests:
                    memory: "?*"
                    cpu: "?*"
                  limits:
                    memory: "?*"
                    cpu: "?*"
