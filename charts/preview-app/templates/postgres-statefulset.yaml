apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-postgres
  namespace: {{ .Release.Namespace }}
spec:
  serviceName: {{ .Release.Name }}-postgres
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-postgres
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-postgres
    spec:
      {{- if .Values.previewNodes.enabled }}
      nodeSelector:
        {{- toYaml .Values.previewNodes.nodeSelector | nindent 8 }}
      tolerations:
        {{- toYaml .Values.previewNodes.tolerations | nindent 8 }}
      {{- end }}
      securityContext:
        # postgres:16-alpine's postgres user is uid/gid 70. Starting the
        # container directly as that uid (rather than root-then-su-exec,
        # the image's default) satisfies the disallow-root policy; fsGroup
        # makes the PVC mount group-writable so initdb still works.
        runAsNonRoot: true
        runAsUser: 70
        runAsGroup: 70
        fsGroup: 70
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: {{ .Values.postgres.image }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: {{ .Values.postgres.user | quote }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.postgres.password | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.postgres.database | quote }}
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgres.user | quote }}]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: init-sql
          configMap:
            name: {{ .Release.Name }}-postgres-init
  # Kubernetes never auto-deletes volumeClaimTemplate-derived PVCs when a
  # StatefulSet is deleted (a deliberate anti-data-loss default). Previews
  # are disposable by design, so opt in to deletion explicitly - otherwise
  # every closed PR leaks a 1Gi EBS volume forever.
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Delete
    whenScaled: Retain
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ .Values.postgres.storageClassName }}
        resources:
          requests:
            storage: {{ .Values.postgres.storageSize }}
