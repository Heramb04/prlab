name: Spot Exporter

on:
  push:
    branches: [main]
    paths:
      - "exporters/**"
      - ".github/workflows/exporter.yml"

permissions:
  id-token: write # required for OIDC AssumeRoleWithWebIdentity
  contents: read

env:
  AWS_REGION: "us-east-1"
  ECR_REPOSITORY: "prlab-spot-exporter"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: tag
        run: echo "tag=sha-$(git rev-parse --short=8 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials (OIDC, no stored keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ECR_PUSH_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        working-directory: exporters
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          docker build -t "$REGISTRY/$ECR_REPOSITORY:$TAG" .
          docker push "$REGISTRY/$ECR_REPOSITORY:$TAG"
          echo "Pushed \`$REGISTRY/$ECR_REPOSITORY:$TAG\` - update exporters/deployment.yaml image tag to roll it out." >> "$GITHUB_STEP_SUMMARY"
