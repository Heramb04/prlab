# Scrape targets beyond what kube-prometheus-stack discovers on its own.
# Prometheus is configured (serviceMonitorSelectorNilUsesHelmValues=false)
# to pick up any ServiceMonitor in the cluster, so these plain manifests
# work without release labels.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: spot-exporter
  namespace: monitoring
spec:
  selector:
    matchLabels:
      app: spot-exporter
  endpoints:
    - port: metrics
      interval: 60s
---
# Karpenter's controller metrics: interruption events received, nodeclaims
# created/disrupted by reason, pool utilization - the "interruptions
# survived" panel reads these.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: karpenter
  namespace: monitoring
spec:
  namespaceSelector:
    matchNames: [kube-system]
  selector:
    matchLabels:
      app.kubernetes.io/name: karpenter
  endpoints:
    - port: http-metrics
      interval: 60s
